<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f3f9;
      --bg-kanban-col: #f1f3f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --border: #e2e8f0;
      --border-hover: #cbd5e1;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-soft: #eef2ff;
      --accent-text: #4338ca;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
      --shadow-md: 0 4px 12px rgba(15,23,42,0.06);
      --shadow-lg: 0 12px 40px rgba(15,23,42,0.1);
      --shadow-card: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.02);
      --shadow-card-hover: 0 4px 16px rgba(15,23,42,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --pending: #f59e0b;
      --pending-bg: #fffbeb;
      --pending-text: #92400e;
      --progress: #3b82f6;
      --progress-bg: #eff6ff;
      --progress-text: #1e40af;
      --done: #10b981;
      --done-bg: #ecfdf5;
      --done-text: #065f46;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --danger-hover: #dc2626;
      --overlay: rgba(15,23,42,0.4);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #1e293b;
      --bg-kanban-col: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --border: #334155;
      --border-hover: #475569;
      --accent: #818cf8;
      --accent-hover: #6366f1;
      --accent-soft: rgba(99,102,241,0.15);
      --accent-text: #a5b4fc;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.25);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
      --shadow-card: 0 1px 3px rgba(0,0,0,0.15);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.25);
      --pending-bg: rgba(245,158,11,0.12);
      --pending-text: #fbbf24;
      --progress-bg: rgba(59,130,246,0.12);
      --progress-text: #60a5fa;
      --done-bg: rgba(16,185,129,0.12);
      --done-text: #34d399;
      --danger-bg: rgba(239,68,68,0.12);
      --overlay: rgba(0,0,0,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout Shell ── */
    .app-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .app-shell.list-view { max-width: 780px; }

    /* ── Header ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-shell.list-view ~ .app-header .header-inner,
    .list-view-header { max-width: 780px; }

    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
    }

    .header-spacer { flex: 1; }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Segmented Control (view toggle + filters) ── */
    .segmented-control {
      display: inline-flex;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
    }

    .segmented-control button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .segmented-control button:hover { color: var(--text-primary); }

    .segmented-control button.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      font-weight: 600;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all var(--transition);
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    /* ── Add Button ── */
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
    .add-btn:active { transform: translateY(0); }

    .add-btn svg { width: 16px; height: 16px; }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      transition: all var(--transition);
    }

    .stat-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-md); }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-value.pending-val { color: var(--pending); }
    .stat-value.progress-val { color: var(--progress); }
    .stat-value.done-val { color: var(--done); }
    .stat-value.total-val { color: var(--text-primary); }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Progress Bar ── */
    .progress-track {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--done), #34d399);
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Toolbar (below stats) ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .toolbar-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* ── List View ── */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 80px;
    }

    .todo-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      transition: all var(--transition);
      position: relative;
    }

    .todo-item:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-card-hover);
    }

    .todo-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      transition: background var(--transition);
    }

    .todo-item.status-pending::before { background: var(--pending); }
    .todo-item.status-in-progress::before { background: var(--progress); }
    .todo-item.status-done::before { background: var(--done); }

    .todo-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .todo-title {
      flex: 1;
      font-size: 0.9375rem;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.4;
    }

    .todo-item.status-done > .todo-body > .todo-header > .todo-title,
    .kanban-card.status-done > .todo-body > .todo-header > .todo-title {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .todo-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .todo-item:hover .todo-body > .todo-header > .todo-actions,
    .kanban-card:hover .todo-body > .todo-header > .todo-actions {
      opacity: 1;
    }

    .todo-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all var(--transition);
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .todo-actions button:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .todo-description {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .todo-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.75rem;
      flex-wrap: wrap;
    }

    .status-badge {
      padding: 2px 10px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status-badge.pending { background: var(--pending-bg); color: var(--pending-text); }
    .status-badge.in-progress { background: var(--progress-bg); color: var(--progress-text); }
    .status-badge.done { background: var(--done-bg); color: var(--done-text); }

    .due-date {
      color: var(--text-tertiary);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .due-date svg { width: 12px; height: 12px; }
    .due-date.overdue { color: var(--danger); font-weight: 600; }

    .empty {
      text-align: center;
      color: var(--text-tertiary);
      padding: 64px 0;
      font-size: 0.9375rem;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* ── Attachments ── */
    .todo-attachments {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .att-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      max-width: 220px;
      transition: all var(--transition);
    }

    .att-chip:hover { border-color: var(--border-hover); }

    .att-chip a {
      color: var(--accent);
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .att-chip a:hover { text-decoration: underline; }

    .att-chip .att-remove {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      padding: 0 2px;
      line-height: 1;
      transition: color var(--transition);
    }

    .att-chip .att-remove:hover { color: var(--danger); }

    /* ── Subtasks (list view) ── */
    .subtask-list {
      list-style: none;
      margin-top: 10px;
      margin-left: 8px;
      padding-left: 16px;
      border-left: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .subtask-list .subtask-list { padding-left: 14px; }

    .subtask-list .todo-item {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
    }

    .subtask-list .todo-title { font-size: 0.875rem; }
    .subtask-list .todo-description { font-size: 0.8125rem; }

    .toggle-children {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.6875rem;
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 6px;
      transition: all var(--transition);
      flex-shrink: 0;
      font-weight: 600;
    }

    .toggle-children:hover { background: var(--accent-soft); }

    .add-subtask-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 6px;
      transition: all var(--transition);
      flex-shrink: 0;
      font-weight: 600;
    }

    .add-subtask-btn:hover { background: var(--accent-soft); }

    .child-count {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      margin-left: 2px;
    }

    /* ── Kanban Board ── */
    .kanban-board {
      display: none;
      gap: 16px;
      padding-bottom: 80px;
    }

    .kanban-board.visible {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .kanban-column {
      background: var(--bg-kanban-col);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }

    .kanban-column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .kanban-column-header .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .kanban-column[data-status="pending"] .col-dot { background: var(--pending); }
    .kanban-column[data-status="in-progress"] .col-dot { background: var(--progress); }
    .kanban-column[data-status="done"] .col-dot { background: var(--done); }

    .kanban-column-header h3 {
      font-size: 0.8125rem;
      font-weight: 700;
      flex: 1;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .kanban-column-header .col-count {
      font-size: 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 1px 8px;
      border-radius: 100px;
      font-weight: 600;
      color: var(--text-tertiary);
    }

    .kanban-cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
      border-radius: var(--radius-sm);
      transition: background var(--transition);
    }

    .kanban-cards.drag-over {
      background: var(--accent-soft);
    }

    .kanban-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: grab;
      transition: all var(--transition);
    }

    .kanban-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-card-hover);
    }

    .kanban-card:active { cursor: grabbing; }

    .kanban-card.dragging {
      opacity: 0.5;
      box-shadow: var(--shadow-lg);
    }

    .kanban-card .todo-header { margin-bottom: 4px; }
    .kanban-card .todo-title { font-size: 0.875rem; }
    .kanban-card .todo-actions { opacity: 0; }
    .kanban-card:hover .todo-body > .todo-header > .todo-actions { opacity: 1; }

    .kanban-card .todo-description {
      font-size: 0.8125rem;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .kanban-card .todo-meta { font-size: 0.6875rem; }
    .kanban-card .todo-attachments { margin-top: 8px; }
    .kanban-card .att-chip { font-size: 0.6875rem; max-width: 160px; }

    /* Kanban subtasks */
    .kanban-subtasks {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .kanban-subtasks .kanban-subtasks {
      margin-top: 4px;
      padding-top: 0;
      border-top: none;
      margin-left: 4px;
      padding-left: 10px;
      border-left: 2px solid var(--border);
    }

    .kanban-subtask-header {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--text-tertiary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .kanban-subtask-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 0.8125rem;
    }

    .kanban-subtask-item .subtask-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .kanban-subtask-item .subtask-dot.pending { background: var(--pending); }
    .kanban-subtask-item .subtask-dot.in-progress { background: var(--progress); }
    .kanban-subtask-item .subtask-dot.done { background: var(--done); }

    .kanban-subtask-item .subtask-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-secondary);
    }

    .kanban-subtask-item.done .subtask-text {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .kanban-empty {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8125rem;
      padding: 24px 0;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.15s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes statPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    @keyframes spinIn {
      from { opacity: 0; transform: rotate(-90deg) scale(0.8); }
      to { opacity: 1; transform: rotate(0) scale(1); }
    }

    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); }
      70% { box-shadow: 0 0 0 8px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }

    @keyframes checkmark {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes subtleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s ease-out;
    }

    .modal h2 {
      margin-bottom: 24px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .modal .parent-info {
      font-size: 0.8125rem;
      color: var(--accent);
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--accent-soft);
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    .modal label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .modal input[type="text"],
    .modal input[type="date"],
    .modal textarea,
    .modal select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      outline: none;
      transition: all var(--transition);
      font-family: inherit;
      margin-bottom: 16px;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .modal textarea { resize: vertical; min-height: 80px; }

    .modal input:focus,
    .modal textarea:focus,
    .modal select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .file-upload-area { margin-bottom: 16px; }

    .file-drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-tertiary);
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .file-drop-zone:hover,
    .file-drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .file-drop-zone input[type="file"] { display: none; }

    .pending-files { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }

    .pending-file {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--accent-text);
      font-weight: 500;
    }

    .pending-file .remove-pending {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      padding: 0 2px;
      transition: color var(--transition);
    }

    .pending-file .remove-pending:hover { color: var(--danger); }

    .existing-attachments { margin-bottom: 16px; }

    .existing-attachments .att-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .modal-buttons button {
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all var(--transition);
    }

    .btn-cancel {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover { background: var(--border); color: var(--text-primary); }

    .btn-save { background: var(--accent); color: #fff; }
    .btn-save:hover { background: var(--accent-hover); }

    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }

    .btn-warning { background: var(--pending); color: #fff; }
    .btn-warning:hover { opacity: 0.9; }

    /* ── Animations ── */
    .todo-item, .kanban-card {
      animation: cardEnter 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .todo-list .todo-item:nth-child(1) { animation-delay: 0ms; }
    .todo-list .todo-item:nth-child(2) { animation-delay: 40ms; }
    .todo-list .todo-item:nth-child(3) { animation-delay: 80ms; }
    .todo-list .todo-item:nth-child(4) { animation-delay: 120ms; }
    .todo-list .todo-item:nth-child(5) { animation-delay: 160ms; }
    .todo-list .todo-item:nth-child(6) { animation-delay: 200ms; }
    .todo-list .todo-item:nth-child(7) { animation-delay: 240ms; }
    .todo-list .todo-item:nth-child(8) { animation-delay: 280ms; }
    .todo-list .todo-item:nth-child(n+9) { animation-delay: 300ms; }

    .kanban-cards .kanban-card:nth-child(1) { animation-delay: 0ms; }
    .kanban-cards .kanban-card:nth-child(2) { animation-delay: 50ms; }
    .kanban-cards .kanban-card:nth-child(3) { animation-delay: 100ms; }
    .kanban-cards .kanban-card:nth-child(4) { animation-delay: 150ms; }
    .kanban-cards .kanban-card:nth-child(n+5) { animation-delay: 200ms; }

    .stat-value.pop { animation: statPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .theme-toggle .theme-icon-anim { animation: spinIn 0.35s cubic-bezier(0.22, 1, 0.36, 1); display: inline-block; }

    .add-btn:active { animation: pulseRing 0.5s ease-out; }

    .status-badge {
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .todo-item:active {
      transform: scale(0.995);
    }

    .kanban-card.dragging {
      transform: rotate(2deg) scale(1.02);
      transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
    }

    .kanban-cards.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -2px;
      transition: background 0.2s, outline 0.2s;
    }

    .toggle-children {
      transition: all var(--transition), transform 0.2s;
    }

    .toggle-children:active {
      transform: scale(0.9);
    }

    .segmented-control button.active {
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-overlay.open .modal {
      animation: slideUp 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn-save, .btn-danger, .btn-warning, .btn-cancel {
      transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn-save:active, .btn-danger:active, .btn-warning:active {
      transform: scale(0.97);
    }

    .att-chip {
      animation: cardEnter 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .pending-file {
      animation: cardEnter 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .progress-fill {
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .empty {
      animation: fadeIn 0.4s ease-out;
    }

    .file-drop-zone {
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .file-drop-zone.dragover {
      transform: scale(1.01);
    }

    /* ── Loading Skeleton ── */
    .skeleton-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      animation: cardEnter 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .skeleton-card:nth-child(2) { animation-delay: 60ms; }
    .skeleton-card:nth-child(3) { animation-delay: 120ms; }

    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border) 37%, var(--bg-tertiary) 63%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
    }

    .skeleton-line.title { width: 55%; height: 16px; margin-bottom: 10px; }
    .skeleton-line.desc { width: 80%; margin-bottom: 8px; }
    .skeleton-line.meta { width: 30%; height: 12px; }

    .skeleton-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .skeleton-stat {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      animation: cardEnter 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .skeleton-stat:nth-child(2) { animation-delay: 50ms; }
    .skeleton-stat:nth-child(3) { animation-delay: 100ms; }
    .skeleton-stat:nth-child(4) { animation-delay: 150ms; }

    .skeleton-stat-val {
      width: 32px;
      height: 24px;
      border-radius: 6px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border) 37%, var(--bg-tertiary) 63%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
    }

    .skeleton-stat-label {
      width: 60px;
      height: 10px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border) 37%, var(--bg-tertiary) 63%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
    }

    /* ── Inline spinner for save button ── */
    .btn-save.loading, .btn-danger.loading, .btn-warning.loading {
      pointer-events: none;
      opacity: 0.75;
      position: relative;
    }

    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Toast notification ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      box-shadow: var(--shadow-lg);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn 0.35s cubic-bezier(0.22, 1, 0.36, 1), toastOut 0.3s ease-in 2.5s forwards;
      pointer-events: auto;
    }

    .toast.success { border-left: 3px solid var(--done); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.info { border-left: 3px solid var(--accent); }

    .toast-icon { font-size: 1rem; flex-shrink: 0; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px) scale(0.95); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(20px); }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; }
      .stats-bar { flex-wrap: wrap; }
      .stat-card { min-width: calc(50% - 8px); }
      .kanban-board.visible { grid-template-columns: 1fr; }
      .kanban-column { min-height: 80px; }
      .subtask-list { margin-left: 2px; padding-left: 12px; }
      .subtask-list .subtask-list { padding-left: 10px; }
      .subtask-list .todo-item { padding: 10px 12px; }
      .app-shell { padding: 0 16px; }
      .header-inner { padding: 12px 16px; }
      .modal { padding: 24px; border-radius: var(--radius-lg); }
    }

    @media (max-width: 480px) {
      .stats-bar { gap: 8px; }
      .stat-card { padding: 12px 14px; }
      .stat-value { font-size: 1.375rem; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="app-logo">
        <div class="logo-icon">T</div>
        Taskflow
      </div>
      <div class="header-spacer"></div>
      <div class="header-controls">
        <div class="segmented-control" id="viewToggle">
          <button class="active" data-view="list">List</button>
          <button data-view="board">Board</button>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <span id="themeIcon">&#9790;</span>
        </button>
        <button class="add-btn" id="openAdd">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
          New Task
        </button>
      </div>
    </div>
  </header>

  <div class="app-shell list-view" id="appContainer">
    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="stat-value total-val" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value pending-val" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value progress-val" id="statProgress">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-value done-val" id="statDone">0</div>
        <div class="stat-label">Completed</div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="toolbar-label" id="toolbarLabel">All Tasks</span>
      <div class="segmented-control" id="filtersBar">
        <button class="active" data-filter="all">All</button>
        <button data-filter="pending">Pending</button>
        <button data-filter="in-progress">In Progress</button>
        <button data-filter="done">Done</button>
      </div>
    </div>

    <!-- List view -->
    <ul class="todo-list" id="todoList"></ul>

    <!-- Kanban view -->
    <div class="kanban-board" id="kanbanBoard">
      <div class="kanban-column" data-status="pending">
        <div class="kanban-column-header">
          <span class="col-dot"></span>
          <h3>Pending</h3>
          <span class="col-count" data-count-status="pending">0</span>
        </div>
        <div class="kanban-cards" data-status="pending"></div>
      </div>
      <div class="kanban-column" data-status="in-progress">
        <div class="kanban-column-header">
          <span class="col-dot"></span>
          <h3>In Progress</h3>
          <span class="col-count" data-count-status="in-progress">0</span>
        </div>
        <div class="kanban-cards" data-status="in-progress"></div>
      </div>
      <div class="kanban-column" data-status="done">
        <div class="kanban-column-header">
          <span class="col-dot"></span>
          <h3>Done</h3>
          <span class="col-count" data-count-status="done">0</span>
        </div>
        <div class="kanban-cards" data-status="done"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">New Task</h2>
      <div class="parent-info" id="parentInfo" style="display:none"></div>
      <form id="todoForm">
        <input type="hidden" id="editId">
        <input type="hidden" id="parentId">

        <label for="fieldTitle">Title *</label>
        <input type="text" id="fieldTitle" required autocomplete="off" placeholder="What needs to be done?">

        <label for="fieldDesc">Description</label>
        <textarea id="fieldDesc" placeholder="Add some details..."></textarea>

        <label for="fieldStatus">Status</label>
        <select id="fieldStatus">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>

        <label for="fieldDue">Due Date</label>
        <input type="date" id="fieldDue">

        <div class="existing-attachments" id="existingAttachments" style="display:none">
          <div class="att-label">Current Attachments</div>
          <div class="todo-attachments" id="existingAttList"></div>
        </div>

        <label>Attachments</label>
        <div class="file-upload-area">
          <div class="file-drop-zone" id="dropZone">
            Click or drag files here (max 10 MB each)
            <input type="file" id="fileInput" multiple>
          </div>
          <div class="pending-files" id="pendingFiles"></div>
        </div>

        <div class="modal-buttons">
          <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirmation dialog -->
  <div class="modal-overlay" id="deleteDialogOverlay">
    <div class="modal" style="max-width:420px">
      <h2>Delete Task</h2>
      <p id="deleteDialogMsg" style="margin-bottom:20px;font-size:0.875rem;color:var(--text-secondary);line-height:1.6"></p>
      <div class="modal-buttons" style="flex-direction:column;gap:8px">
        <button class="btn-danger" id="deleteCascadeBtn" style="width:100%;text-align:center">Delete all</button>
        <button class="btn-warning" id="deleteReparentBtn" style="width:100%;text-align:center">Keep subtasks</button>
        <button class="btn-cancel" id="deleteCancelBtn" style="width:100%;text-align:center">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    let todos = [];
    let filter = "all";
    let viewMode = "list";
    let pendingFileList = [];
    const collapsed = new Set();

    const appContainer = document.getElementById("appContainer");
    const todoList = document.getElementById("todoList");
    const kanbanBoard = document.getElementById("kanbanBoard");
    const filtersBar = document.getElementById("filtersBar");
    const modalOverlay = document.getElementById("modalOverlay");
    const todoForm = document.getElementById("todoForm");
    const modalTitle = document.getElementById("modalTitle");
    const editId = document.getElementById("editId");
    const parentIdField = document.getElementById("parentId");
    const parentInfo = document.getElementById("parentInfo");
    const fieldTitle = document.getElementById("fieldTitle");
    const fieldDesc = document.getElementById("fieldDesc");
    const fieldStatus = document.getElementById("fieldStatus");
    const fieldDue = document.getElementById("fieldDue");
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const pendingFilesEl = document.getElementById("pendingFiles");
    const existingAttachments = document.getElementById("existingAttachments");
    const existingAttList = document.getElementById("existingAttList");

    // ── Theme ──
    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      const icon = document.getElementById("themeIcon");
      icon.classList.remove("theme-icon-anim");
      void icon.offsetWidth;
      icon.innerHTML = theme === "dark" ? "&#9728;" : "&#9790;";
      icon.classList.add("theme-icon-anim");
      localStorage.setItem("theme", theme);
    }

    document.getElementById("themeToggle").addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      setTheme(current === "dark" ? "light" : "dark");
    });

    // Init theme from preference
    const savedTheme = localStorage.getItem("theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    setTheme(savedTheme);

    // ── Toast notifications ──
    function showToast(message, type = "success") {
      const container = document.getElementById("toastContainer");
      const icons = { success: "&#10003;", error: "&#10007;", info: "&#8505;" };
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span>${escapeHtml(message)}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ── Loading skeletons ──
    function showLoadingSkeleton() {
      const statsBar = document.getElementById("statsBar");
      statsBar.innerHTML = `<div class="skeleton-stats">
        <div class="skeleton-stat"><div class="skeleton-stat-val"></div><div class="skeleton-stat-label"></div></div>
        <div class="skeleton-stat"><div class="skeleton-stat-val"></div><div class="skeleton-stat-label"></div></div>
        <div class="skeleton-stat"><div class="skeleton-stat-val"></div><div class="skeleton-stat-label"></div></div>
        <div class="skeleton-stat"><div class="skeleton-stat-val"></div><div class="skeleton-stat-label"></div></div>
      </div>`;
      todoList.innerHTML = `<div class="skeleton-container">
        <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line meta"></div></div>
      </div>`;
    }

    function restoreStatsBar() {
      document.getElementById("statsBar").innerHTML = `
        <div class="stat-card"><div class="stat-value total-val" id="statTotal">0</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-value pending-val" id="statPending">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-value progress-val" id="statProgress">0</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card"><div class="stat-value done-val" id="statDone">0</div><div class="stat-label">Completed</div><div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>
      `;
    }

    let isInitialLoad = true;

    // ── Data helpers ──
    async function fetchTodos() {
      if (isInitialLoad) showLoadingSkeleton();
      try {
        const res = await fetch("/api/todos");
        todos = await res.json();
        if (isInitialLoad) { restoreStatsBar(); isInitialLoad = false; }
        render();
      } catch (err) {
        if (isInitialLoad) { restoreStatsBar(); isInitialLoad = false; }
        showToast("Failed to load tasks", "error");
      }
    }

    function getChildren(parentId) {
      return todos.filter(t => t.parentId === parentId);
    }

    function getAllDescendants(parentId) {
      const children = getChildren(parentId);
      let all = [...children];
      for (const c of children) all.push(...getAllDescendants(c.id));
      return all;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function isOverdue(todo) {
      if (!todo.dueDate || todo.status === "done") return false;
      return new Date(todo.dueDate + "T23:59:59") < new Date();
    }

    function statusLabel(s) {
      return s === "in-progress" ? "In Progress" : s.charAt(0).toUpperCase() + s.slice(1);
    }

    function animateStatValue(el, newVal) {
      const oldVal = parseInt(el.textContent) || 0;
      if (oldVal === newVal) return;
      el.textContent = newVal;
      el.classList.remove("pop");
      void el.offsetWidth; // force reflow
      el.classList.add("pop");
    }

    function updateStats() {
      const total = todos.length;
      const pending = todos.filter(t => t.status === "pending").length;
      const progress = todos.filter(t => t.status === "in-progress").length;
      const done = todos.filter(t => t.status === "done").length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      const elTotal = document.getElementById("statTotal");
      const elPending = document.getElementById("statPending");
      const elProgress = document.getElementById("statProgress");
      const elDone = document.getElementById("statDone");
      const elFill = document.getElementById("progressFill");

      if (elTotal) animateStatValue(elTotal, total);
      if (elPending) animateStatValue(elPending, pending);
      if (elProgress) animateStatValue(elProgress, progress);
      if (elDone) animateStatValue(elDone, done);
      if (elFill) elFill.style.width = pct + "%";

      const filterLabels = { all: "All Tasks", pending: "Pending Tasks", "in-progress": "In Progress", done: "Completed" };
      document.getElementById("toolbarLabel").textContent = filterLabels[filter] || "All Tasks";
    }

    function renderAttachmentChips(attachments, todoId) {
      if (!attachments || attachments.length === 0) return "";
      const chips = attachments.map(a => `
        <span class="att-chip">
          <a href="/uploads/${encodeURIComponent(a.filename)}" target="_blank" title="${escapeHtml(a.originalName)} (${formatSize(a.size)})">${escapeHtml(a.originalName)}</a>
          <button class="att-remove" data-todo-id="${todoId}" data-att-id="${a.id}" title="Remove">&#10005;</button>
        </span>
      `).join("");
      return `<div class="todo-attachments">${chips}</div>`;
    }

    // ── Render ──
    function render() {
      updateStats();
      if (viewMode === "list") renderList();
      else renderKanban();
    }

    function todoBodyHtml(t, showStatus) {
      const calendarSvg = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="2" y1="7" x2="14" y2="7"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/></svg>';
      return `
        <div class="todo-body">
          <div class="todo-header">
            <span class="todo-title">${escapeHtml(t.title)}</span>
            <span class="todo-actions">
              <button class="add-subtask-btn" data-parent-id="${t.id}" title="Add subtask">+ sub</button>
              <button class="edit-btn" title="Edit">&#9998;</button>
              <button class="delete-btn" title="Delete">&#10005;</button>
            </span>
          </div>
          ${t.description ? `<div class="todo-description">${escapeHtml(t.description)}</div>` : ""}
          <div class="todo-meta">
            ${showStatus ? `<span class="status-badge ${t.status}">${statusLabel(t.status)}</span>` : ""}
            ${t.dueDate ? `<span class="due-date ${isOverdue(t) ? "overdue" : ""}">${calendarSvg} ${formatDate(t.dueDate)}</span>` : ""}
          </div>
          ${renderAttachmentChips(t.attachments, t.id)}
        </div>
      `;
    }

    function renderTodoTree(parentId, depth) {
      let items = getChildren(parentId);
      if (filter !== "all") {
        items = items.filter(t => {
          if (t.status === filter) return true;
          return getAllDescendants(t.id).some(d => d.status === filter);
        });
      }
      if (items.length === 0) return "";

      let html = depth === 0 ? "" : `<ul class="subtask-list">`;

      for (const t of items) {
        const children = getChildren(t.id);
        const hasChildren = children.length > 0;
        const isCollapsed = collapsed.has(t.id);
        const childHtml = isCollapsed ? "" : renderTodoTree(t.id, depth + 1);

        const toggleBtn = hasChildren
          ? `<button class="toggle-children" data-toggle-id="${t.id}">${isCollapsed ? "&#9654;" : "&#9660;"} <span class="child-count">${children.length}</span></button>`
          : "";

        html += `
          <li class="todo-item status-${t.status}" data-id="${t.id}">
            ${toggleBtn}
            ${todoBodyHtml(t, true)}
            ${childHtml}
          </li>
        `;
      }

      html += depth === 0 ? "" : "</ul>";
      return html;
    }

    function renderList() {
      const rootItems = todos.filter(t => !t.parentId || t.parentId === null);
      let filtered = rootItems;
      if (filter !== "all") {
        filtered = rootItems.filter(t => {
          if (t.status === filter) return true;
          return getAllDescendants(t.id).some(d => d.status === filter);
        });
      }

      if (filtered.length === 0) {
        const label = filter === "all" ? "" : statusLabel(filter).toLowerCase() + " ";
        todoList.innerHTML = `<li class="empty"><div class="empty-icon">&#9744;</div>No ${label}tasks yet</li>`;
        return;
      }

      let html = "";
      for (const t of filtered) {
        const children = getChildren(t.id);
        const hasChildren = children.length > 0;
        const isCollapsed = collapsed.has(t.id);
        const childHtml = isCollapsed ? "" : renderTodoTree(t.id, 1);

        const toggleBtn = hasChildren
          ? `<button class="toggle-children" data-toggle-id="${t.id}">${isCollapsed ? "&#9654;" : "&#9660;"} <span class="child-count">${children.length}</span></button>`
          : "";

        html += `
          <li class="todo-item status-${t.status}" data-id="${t.id}">
            ${toggleBtn}
            ${todoBodyHtml(t, true)}
            ${childHtml}
          </li>
        `;
      }
      todoList.innerHTML = html;
    }

    function renderKanbanSubtasks(parentId, depth) {
      const children = getChildren(parentId);
      if (children.length === 0) return "";

      const isTop = depth === 0;
      let html = `<div class="kanban-subtasks">`;
      if (isTop) html += `<div class="kanban-subtask-header">Subtasks (${children.length})</div>`;
      for (const c of children) {
        html += `
          <div class="kanban-subtask-item ${c.status}" data-id="${c.id}">
            <span class="subtask-dot ${c.status}"></span>
            <span class="subtask-text">${escapeHtml(c.title)}</span>
            <span class="todo-actions" style="opacity:1">
              <button class="add-subtask-btn" data-parent-id="${c.id}" title="Add subtask" style="font-size:0.72rem;padding:2px 4px">+ sub</button>
              <button class="edit-btn" title="Edit" style="font-size:0.8rem;padding:2px 4px">&#9998;</button>
              <button class="delete-btn" title="Delete" style="font-size:0.8rem;padding:2px 4px">&#10005;</button>
            </span>
          </div>
          ${renderKanbanSubtasks(c.id, depth + 1)}
        `;
      }
      html += "</div>";
      return html;
    }

    function renderKanban() {
      const statuses = ["pending", "in-progress", "done"];
      const rootTodos = todos.filter(t => !t.parentId || t.parentId === null);

      for (const status of statuses) {
        const col = kanbanBoard.querySelector(`.kanban-cards[data-status="${status}"]`);
        const items = rootTodos.filter(t => t.status === status);
        kanbanBoard.querySelector(`[data-count-status="${status}"]`).textContent = items.length;

        if (items.length === 0) {
          col.innerHTML = `<div class="kanban-empty">No items</div>`;
        } else {
          col.innerHTML = items.map(t => `
            <div class="kanban-card status-${t.status}" data-id="${t.id}" draggable="true">
              ${todoBodyHtml(t, false)}
              ${renderKanbanSubtasks(t.id, 0)}
            </div>
          `).join("");
        }
      }
    }

    // ── View Toggle ──
    document.getElementById("viewToggle").addEventListener("click", e => {
      if (e.target.tagName !== "BUTTON") return;
      const view = e.target.dataset.view;
      if (view === viewMode) return;
      viewMode = view;
      document.querySelectorAll("#viewToggle button").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");

      if (viewMode === "board") {
        appContainer.classList.remove("list-view");
        todoList.style.display = "none";
        kanbanBoard.classList.add("visible");
        filtersBar.parentElement.style.display = "none";
      } else {
        appContainer.classList.add("list-view");
        todoList.style.display = "";
        kanbanBoard.classList.remove("visible");
        filtersBar.parentElement.style.display = "";
      }
      render();
    });

    // ── Kanban Drag & Drop ──
    kanbanBoard.addEventListener("dragstart", e => {
      const card = e.target.closest(".kanban-card");
      if (!card) return;
      card.classList.add("dragging");
      e.dataTransfer.setData("text/plain", card.dataset.id);
      e.dataTransfer.effectAllowed = "move";
    });

    kanbanBoard.addEventListener("dragend", e => {
      const card = e.target.closest(".kanban-card");
      if (card) card.classList.remove("dragging");
      document.querySelectorAll(".kanban-cards.drag-over").forEach(el => el.classList.remove("drag-over"));
    });

    kanbanBoard.addEventListener("dragover", e => {
      const zone = e.target.closest(".kanban-cards");
      if (!zone) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      zone.classList.add("drag-over");
    });

    kanbanBoard.addEventListener("dragleave", e => {
      const zone = e.target.closest(".kanban-cards");
      if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove("drag-over");
    });

    kanbanBoard.addEventListener("drop", async e => {
      const zone = e.target.closest(".kanban-cards");
      if (!zone) return;
      e.preventDefault();
      zone.classList.remove("drag-over");
      const id = e.dataTransfer.getData("text/plain");
      const newStatus = zone.dataset.status;
      try {
        await fetch(`/api/todos/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: newStatus })
        });
        const labels = { pending: "Pending", "in-progress": "In Progress", done: "Done" };
        showToast(`Moved to ${labels[newStatus]}`, "info");
        await fetchTodos();
      } catch { showToast("Failed to update status", "error"); }
    });

    // ── File Drop Zone ──
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      addPendingFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener("change", () => {
      addPendingFiles(fileInput.files);
      fileInput.value = "";
    });

    function addPendingFiles(files) {
      for (const f of files) pendingFileList.push(f);
      renderPendingFiles();
    }

    function renderPendingFiles() {
      pendingFilesEl.innerHTML = pendingFileList.map((f, i) => `
        <span class="pending-file">
          ${escapeHtml(f.name)} (${formatSize(f.size)})
          <button type="button" class="remove-pending" data-index="${i}">&#10005;</button>
        </span>
      `).join("");
    }

    pendingFilesEl.addEventListener("click", e => {
      const btn = e.target.closest(".remove-pending");
      if (!btn) return;
      pendingFileList.splice(Number(btn.dataset.index), 1);
      renderPendingFiles();
    });

    // ── Modal ──
    function openModal(todo, newParentId) {
      pendingFileList = [];
      renderPendingFiles();

      if (todo) {
        modalTitle.textContent = "Edit Task";
        editId.value = todo.id;
        parentIdField.value = "";
        fieldTitle.value = todo.title;
        fieldDesc.value = todo.description || "";
        fieldStatus.value = todo.status;
        fieldDue.value = todo.dueDate || "";
        if (todo.parentId) {
          const parent = todos.find(t => t.id === todo.parentId);
          parentInfo.textContent = "Subtask of: " + (parent ? parent.title : "Unknown");
          parentInfo.style.display = "";
        } else {
          parentInfo.style.display = "none";
        }
        if (todo.attachments && todo.attachments.length > 0) {
          existingAttachments.style.display = "";
          existingAttList.innerHTML = todo.attachments.map(a => `
            <span class="att-chip">
              <a href="/uploads/${encodeURIComponent(a.filename)}" target="_blank">${escapeHtml(a.originalName)}</a>
              <button type="button" class="att-remove" data-todo-id="${todo.id}" data-att-id="${a.id}" title="Remove">&#10005;</button>
            </span>
          `).join("");
        } else {
          existingAttachments.style.display = "none";
        }
      } else {
        const isSubtask = newParentId != null;
        modalTitle.textContent = isSubtask ? "New Subtask" : "New Task";
        editId.value = "";
        parentIdField.value = newParentId || "";
        todoForm.reset();
        fieldStatus.value = "pending";
        existingAttachments.style.display = "none";
        if (isSubtask) {
          const parent = todos.find(t => t.id === Number(newParentId));
          parentInfo.textContent = "Subtask of: " + (parent ? parent.title : "Unknown");
          parentInfo.style.display = "";
        } else {
          parentInfo.style.display = "none";
        }
      }
      modalOverlay.classList.add("open");
      fieldTitle.focus();
    }

    function closeModal() { modalOverlay.classList.remove("open"); }

    existingAttList.addEventListener("click", async e => {
      const btn = e.target.closest(".att-remove");
      if (!btn) return;
      const todoId = btn.dataset.todoId;
      const attId = btn.dataset.attId;
      await fetch(`/api/todos/${todoId}/attachments/${attId}`, { method: "DELETE" });
      await fetchTodos();
      const updated = todos.find(t => t.id === Number(todoId));
      if (updated) openModal(updated);
    });

    async function uploadFiles(todoId) {
      if (pendingFileList.length === 0) return;
      const formData = new FormData();
      for (const f of pendingFileList) formData.append("files", f);
      await fetch(`/api/todos/${todoId}/attachments`, { method: "POST", body: formData });
    }

    document.getElementById("openAdd").addEventListener("click", () => openModal(null, null));
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });

    todoForm.addEventListener("submit", async e => {
      e.preventDefault();
      const data = {
        title: fieldTitle.value.trim(),
        description: fieldDesc.value.trim(),
        status: fieldStatus.value,
        dueDate: fieldDue.value || null
      };
      if (!data.title) return;

      const saveBtn = todoForm.querySelector(".btn-save");
      const originalText = saveBtn.textContent;
      saveBtn.classList.add("loading");
      saveBtn.innerHTML = `<span class="btn-spinner"></span>Saving...`;

      try {
        const id = editId.value;
        let todoId;
        if (id) {
          await fetch(`/api/todos/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
          });
          todoId = id;
        } else {
          const pId = parentIdField.value;
          if (pId) data.parentId = Number(pId);
          const res = await fetch("/api/todos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
          });
          const created = await res.json();
          todoId = created.id;
        }

        await uploadFiles(todoId);
        closeModal();
        showToast(id ? "Task updated" : "Task created", "success");
        await fetchTodos();
      } catch (err) {
        showToast("Something went wrong", "error");
      } finally {
        saveBtn.classList.remove("loading");
        saveBtn.textContent = originalText;
      }
    });

    // ── Filters (list view) ──
    filtersBar.addEventListener("click", e => {
      if (e.target.tagName !== "BUTTON") return;
      filter = e.target.dataset.filter;
      document.querySelectorAll("#filtersBar button").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      render();
    });

    // ── Delete dialog ──
    const deleteDialogOverlay = document.getElementById("deleteDialogOverlay");
    const deleteDialogMsg = document.getElementById("deleteDialogMsg");
    let deleteDialogTodo = null;

    function showDeleteDialog(todo) {
      deleteDialogTodo = todo;
      const allDesc = getAllDescendants(todo.id);
      deleteDialogMsg.innerHTML = `<strong>${escapeHtml(todo.title)}</strong> has ${allDesc.length} subtask${allDesc.length > 1 ? "s" : ""}.<br><br>` +
        `<strong>Delete all</strong> removes this task and all its subtasks.<br>` +
        `<strong>Keep subtasks</strong> moves them ${todo.parentId ? "under the parent task" : "to the top level"}.`;
      deleteDialogOverlay.classList.add("open");
    }

    function closeDeleteDialog() {
      deleteDialogOverlay.classList.remove("open");
      deleteDialogTodo = null;
    }

    document.getElementById("deleteCascadeBtn").addEventListener("click", async () => {
      if (!deleteDialogTodo) return;
      const btn = document.getElementById("deleteCascadeBtn");
      const orig = btn.textContent;
      btn.classList.add("loading");
      btn.innerHTML = `<span class="btn-spinner"></span>Deleting...`;
      try {
        await fetch(`/api/todos/${deleteDialogTodo.id}?cascade=true`, { method: "DELETE" });
        closeDeleteDialog();
        showToast("Task and subtasks deleted", "success");
        await fetchTodos();
      } catch { showToast("Delete failed", "error"); }
      finally { btn.classList.remove("loading"); btn.textContent = orig; }
    });

    document.getElementById("deleteReparentBtn").addEventListener("click", async () => {
      if (!deleteDialogTodo) return;
      const btn = document.getElementById("deleteReparentBtn");
      const orig = btn.textContent;
      btn.classList.add("loading");
      btn.innerHTML = `<span class="btn-spinner"></span>Deleting...`;
      try {
        await fetch(`/api/todos/${deleteDialogTodo.id}?cascade=false`, { method: "DELETE" });
        closeDeleteDialog();
        showToast("Task deleted, subtasks kept", "success");
        await fetchTodos();
      } catch { showToast("Delete failed", "error"); }
      finally { btn.classList.remove("loading"); btn.textContent = orig; }
    });

    document.getElementById("deleteCancelBtn").addEventListener("click", closeDeleteDialog);
    deleteDialogOverlay.addEventListener("click", e => {
      if (e.target === deleteDialogOverlay) closeDeleteDialog();
    });

    // ── Card actions (works for both views) ──
    function handleCardActions(root) {
      root.addEventListener("click", async e => {
        const toggleBtn = e.target.closest(".toggle-children");
        if (toggleBtn) {
          const tid = Number(toggleBtn.dataset.toggleId);
          if (collapsed.has(tid)) collapsed.delete(tid);
          else collapsed.add(tid);
          render();
          return;
        }

        const subBtn = e.target.closest(".add-subtask-btn");
        if (subBtn) {
          openModal(null, subBtn.dataset.parentId);
          return;
        }

        const attBtn = e.target.closest(".att-remove");
        if (attBtn) {
          await fetch(`/api/todos/${attBtn.dataset.todoId}/attachments/${attBtn.dataset.attId}`, { method: "DELETE" });
          await fetchTodos();
          return;
        }

        const actionBtn = e.target.closest(".edit-btn") || e.target.closest(".delete-btn");
        if (!actionBtn) return;
        const card = actionBtn.closest("[data-id]");
        if (!card) return;
        const id = Number(card.dataset.id);
        const todo = todos.find(t => t.id === id);
        if (!todo) return;

        if (actionBtn.classList.contains("delete-btn")) {
          const children = getChildren(id);
          if (children.length > 0) {
            showDeleteDialog(todo);
          } else {
            try {
              await fetch(`/api/todos/${id}`, { method: "DELETE" });
              showToast("Task deleted", "success");
              await fetchTodos();
            } catch { showToast("Delete failed", "error"); }
          }
        }

        if (actionBtn.classList.contains("edit-btn")) {
          openModal(todo);
        }
      });
    }

    handleCardActions(todoList);
    handleCardActions(kanbanBoard);

    // Keyboard shortcut: Escape closes modals
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        if (deleteDialogOverlay.classList.contains("open")) closeDeleteDialog();
        else if (modalOverlay.classList.contains("open")) closeModal();
      }
    });

    fetchTodos();
  </script>
</body>
</html>
